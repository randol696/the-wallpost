<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="64" height="64" rx="14" ry="14" />
    </clipPath>
    <pattern id="brickPattern" width="16" height="16" patternUnits="userSpaceOnUse">
      <line x1="0" y1="8" x2="16" y2="8" stroke="#3d3148" stroke-opacity="0.55" stroke-width="0.6" />
      <line x1="8" y1="0" x2="8" y2="8" stroke="#3d3148" stroke-opacity="0.55" stroke-width="0.6" />
      <line x1="0" y1="16" x2="16" y2="16" stroke="#3d3148" stroke-opacity="0.55" stroke-width="0.6" />
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="38%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22" />
    </radialGradient>
  </defs>

  <g clip-path="url(#roundedSquare)">
